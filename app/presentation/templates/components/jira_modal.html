<!-- Create Jira Modal Component -->
<dialog id="createJiraModal" class="modal">
  <div class="modal-box w-11/12 max-w-7xl glass-panel-card">
    <form method="dialog">
      <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
    </form>
    <h3 class="font-bold text-lg mb-4 flex items-center gap-2">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
      </svg>
      Create Jira Tasks
    </h3>
    
    <div id="jiraTasksContainer" class="space-y-4 mb-4 overflow-auto" style="max-height: calc(90vh - 200px);">
      <!-- Tasks will be dynamically added here -->
    </div>

    <div class="flex gap-2 mb-4">
      <button type="button" onclick="addJiraTask()" class="btn btn-sm btn-primary">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
        Add Task
      </button>
      <div class="flex items-center gap-2 ml-4">
        <label for="jiraEnvironment" class="text-sm">Environment:</label>
        <select id="jiraEnvironment" class="select select-sm select-bordered">
          <option value="prod" selected>Production</option>
          <option value="dev">Development</option>
          <option value="test">Test</option>
        </select>
      </div>
    </div>

    <div class="modal-action">
      <button type="button" id="jiraSubmitButton" onclick="submitJiraBatch()" class="btn btn-primary">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        Create Jira Batch
      </button>
      <form method="dialog">
        <button class="btn">Cancel</button>
      </form>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
