{# Timing SAF: Execution Output Modal (with real-time streaming) #}
<dialog id="executionOutputModal" class="modal">
  <div class="modal-box w-11/12 max-w-5xl max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-bold text-lg">SAF Execution Output</h3>
      <button class="btn btn-sm btn-circle btn-ghost" onclick="document.getElementById('executionOutputModal').close()">✕</button>
    </div>
    <div class="flex-1 overflow-y-auto">
      {{ execution_output('executionOutputGroup') }}
    </div>
    <div class="mt-3 flex justify-end gap-2">
      <button class="btn btn-sm" onclick="document.getElementById('executionOutputModal').close()">Close</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
