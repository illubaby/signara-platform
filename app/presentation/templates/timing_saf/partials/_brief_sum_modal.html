{# Timing SAF: Brief Sum Modal #}
<dialog id="briefSumModal" class="modal">
  <div class="modal-box w-11/12 max-w-5xl max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-bold text-lg">
        <span id="briefSumTitle">Brief Summary</span>
      </h3>
      <button class="btn btn-sm btn-circle btn-ghost" onclick="document.getElementById('briefSumModal').close()">✕</button>
    </div>
    
    <div class="mb-2">
      <div class="text-sm opacity-70 mb-1">
        <span id="briefSumPath"></span>
      </div>
      <div id="briefSumStats" class="text-xs flex gap-3"></div>
    </div>
    
    <div class="flex-1 overflow-y-auto bg-base-200 rounded">
      <table class="table table-sm table-zebra w-full" id="briefSumTable">
        <thead class="sticky top-0 bg-base-300 z-10">
          <tr>
            <th class="w-2/3">Check Name</th>
            <th class="w-1/3">Status</th>
          </tr>
        </thead>
        <tbody id="briefSumTableBody">
          <tr><td colspan="2" class="text-center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
    
    <div class="mt-3 flex justify-end gap-2">
      <button class="btn btn-sm" onclick="document.getElementById('briefSumModal').close()">Close</button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
