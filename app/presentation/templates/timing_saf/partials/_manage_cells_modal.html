{# Timing SAF: Manage Cells Visibility Modal #}
<dialog id="manageCellsModal" class="modal">
  <div class="modal-box w-11/12 max-w-3xl max-h-[90vh]">
    <div class="flex items-center justify-between mb-3">
      <h3 class="font-bold text-lg">Manage Cell Visibility</h3>
      <button class="btn btn-sm btn-circle btn-ghost" onclick="document.getElementById('manageCellsModal').close()">✕</button>
    </div>
    <div class="mb-3 flex gap-2 flex-wrap">
      <button id="tickAllBtn" class="btn btn-sm btn-success">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
        </svg>
        Show All
      </button>
      <button id="untickAllBtn" class="btn btn-sm btn-error">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
        </svg>
        Hide All
      </button>
    </div>
    <div class="form-control mb-3">
      <input type="text" id="manageCellsSearch" placeholder="Search cells in this list..." class="input input-sm input-bordered">
    </div>
    <div id="manageCellsList" class="border rounded-lg p-3 max-h-96 overflow-y-auto bg-base-200"></div>
    <div class="mt-3 flex justify-end">
      <button class="btn btn-sm btn-primary" onclick="document.getElementById('manageCellsModal').close()">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
        OK
      </button>
    </div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>
