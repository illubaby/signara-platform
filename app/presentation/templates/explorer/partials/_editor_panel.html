{# Explorer Editor Panel Partial #}
<div class="explorer-editor-wrapper" id="explorerEditorWrapper">
  <div class="mb-2">
    <div class="flex items-center gap-2 justify-between">
      <div class="flex flex-col gap-1 flex-1 min-w-0">
        <span class="text-xs font-semibold truncate" id="editorFilename">(no file selected)</span>
        <div class="flex items-center gap-2 min-w-0 group">
          <span class="text-xs opacity-60 font-mono truncate flex-1" id="editorFullPath" title=""></span>
          <button id="copyPathBtn" class="btn btn-xs btn-ghost opacity-0 group-hover:opacity-100 transition-opacity is-hidden" title="Copy full path">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="flex gap-2 flex-shrink-0">
        <button id="saveFileBtn" class="btn btn-sm btn-primary" disabled>
          <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path>
          </svg>
          Save
        </button>
  <button id="exitCompareBtn" class="btn btn-sm btn-ghost is-hidden">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
          Exit Compare
        </button>
  <span id="editorStatus" class="text-xs self-center ml-2" role="status" aria-live="polite"></span>
      </div>
    </div>
  </div>
  <div id="fileEditorMonaco" class="border rounded-lg overflow-hidden shadow editor-bounds"></div>
  <div class="text-[9px] opacity-50 mt-1">Monaco editor loaded client-side. Files >512KB truncated for display. Use with caution - changes are immediately written to disk.</div>
</div>
